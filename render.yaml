# Optional Blueprint for Render (https://render.com/docs/blueprint-spec)
# Connect your repo and Render will read this file, or create a Web Service manually with Docker runtime.

services:
  - type: web
    name: cambo-mart
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: cambo-mart-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cambo-mart-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: cambo-mart-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: cambo-mart-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cambo-mart-db
          property: password
      - key: RUN_MIGRATIONS
        value: "true"
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file

databases:
  - name: cambo-mart-db
    plan: free
    databaseName: cambomart
    user: cambomart
